  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: 48px 16px 88px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 64px;
      background:
        radial-gradient(ellipse 90% 70% at 20% 10%, rgba(50, 75, 150, 0.18), transparent 50%),
        radial-gradient(ellipse 80% 50% at 80% 90%, rgba(140, 90, 40, 0.1), transparent 50%),
        radial-gradient(ellipse 100% 80% at 50% -15%, rgba(32, 38, 68, 0.55), transparent 52%),
        linear-gradient(180deg, #0a0a10 0%, #050508 45%, #07070b 100%);
    }
    .card {
      width: min(360px, 92vw);
      aspect-ratio: 9 / 16;
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      background: linear-gradient(180deg, #0f1018 0%, #07070c 40%, #0a0a12 100%);
      box-shadow:
        0 22px 56px rgba(0,0,0,0.72),
        0 0 0 1px rgba(255,255,255,0.05),
        0 0 80px -25px rgba(50, 90, 180, 0.14);
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 14px;
      padding: 1px;
      box-sizing: border-box;
      background: linear-gradient(145deg,
        rgba(255,255,255,0.07) 0%,
        rgba(180, 150, 90, 0.1) 45%,
        rgba(255,255,255,0.03) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      pointer-events: none;
      z-index: 4;
    }
    .logo-cta {
      display: block;
      margin: 0.55em 0 0 0;
      line-height: 0;
      text-align: center;
    }
    .logo-cta__img {
      display: block;
      max-width: min(88%, 240px);
      width: 100%;
      height: auto;
      margin: 0 auto;
      object-fit: contain;
    }
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.48s ease, filter 0.48s ease;
      pointer-events: none;
      z-index: 0;
    }
    .slide.on {
      opacity: 1;
      z-index: 3;
      filter: blur(0px);
    }
    .slide:not(.on) {
      filter: blur(4px);
    }
    .slide .layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #000;
    }
    .slide .layer::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        radial-gradient(circle at 50% 120%, rgba(255,180,0,0.12), transparent 60%),
        linear-gradient(to top, rgba(0,0,0,0.5), transparent 40%);
    }
    .slide.slide--image .layer::after {
      display: block;
      z-index: 2;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.2) 0%, transparent 22%),
        linear-gradient(0deg, rgba(0,0,0,0.35) 0%, transparent 28%),
        linear-gradient(90deg, rgba(0,0,0,0.18) 0%, transparent 10%, transparent 90%, rgba(0,0,0,0.18) 100%),
        radial-gradient(ellipse 100% 85% at 50% 50%, transparent 55%, rgba(0,0,0,0.4) 100%),
        linear-gradient(130deg, rgba(45, 75, 200, 0.06) 0%, transparent 40%);
    }
    .slide.slide--text .layer::after {
      display: none;
    }
    .slide.slide--image .layer {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4.5% 5.5%;
      background:
        radial-gradient(ellipse 95% 70% at 50% 0%, rgba(50, 70, 120, 0.22) 0%, transparent 55%),
        radial-gradient(ellipse 90% 55% at 50% 100%, rgba(150, 100, 50, 0.12) 0%, transparent 50%),
        linear-gradient(160deg, #0a0a12 0%, #020203 45%, #06060c 100%);
      box-shadow: inset 0 0 72px rgba(0,0,0,0.3);
    }
    .slide .layer img {
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      object-fit: contain;
      object-position: center center;
      display: block;
      transform-origin: center center;
      will-change: transform;
    }
    .slide.slide--image .layer img {
      position: relative;
      z-index: 0;
      width: auto;
      height: auto;
      left: auto;
      top: auto;
      max-width: 100%;
      max-height: 100%;
      margin: auto;
      border-radius: 4px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.2),
        0 10px 36px rgba(0,0,0,0.42);
      transform: scale(0.88);
    }
    .slide .cap {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 3;
      padding-left: 7%;
      padding-right: 7%;
      font-weight: 900;
      font-size: clamp(1.12rem, 4.8vw, 1.42rem);
      line-height: 1.02;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      text-align: center;
      color: #fafafa;
      text-shadow: 0 0 2px #000, 0 3px 20px rgba(0,0,0,0.95), 0 0 36px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.48s ease 0.1s;
    }
    .slide.on .cap { opacity: 1; }
    .slide.slide--text .cap.cap-text-only {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-rendering: optimizeLegibility;
      padding: 10% 7%;
      font-size: clamp(1.5rem, 6.5vw, 2.2rem);
      line-height: 0.95;
      letter-spacing: 0.045em;
      font-weight: 800;
      text-transform: uppercase;
      color: #f2f3f5;
      background:
        linear-gradient(180deg, rgba(50, 85, 180, 0.1) 0%, transparent 18%),
        linear-gradient(165deg, rgba(6,7,12,0.35) 0%, transparent 45%),
        radial-gradient(ellipse 100% 70% at 50% 45%, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.97) 65%),
        radial-gradient(ellipse 90% 50% at 50% 115%, rgba(200, 155, 60, 0.2), transparent 55%),
        radial-gradient(circle at 50% 0%, rgba(50, 60, 100, 0.3), transparent 45%),
        linear-gradient(180deg, #000 0%, #080810 100%);
      box-shadow: inset 0 0 28px rgba(0,0,0,0.22);
      text-shadow:
        0 0 1px rgba(0,0,0,0.8),
        0 1px 2px rgba(0,0,0,0.95),
        0 4px 24px rgba(0,0,0,0.85),
        0 0 40px rgba(0,0,0,0.5);
    }
    .cap-cta__subline {
      max-width: 100%;
      margin: 0.35em 0 0 0;
      padding: 0 2%;
      font-size: clamp(0.8rem, 2.1vw, 0.95rem);
      line-height: 1.2;
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0.04em;
      text-align: center;
      color: #d2d5dc;
    }
    .cap-cta__la {
      max-width: 100%;
      margin: 0.35em 0 0.1em 0;
      padding: 0 2%;
      font-size: clamp(0.72rem, 2.05vw, 0.92rem);
      line-height: 1.25;
      font-weight: 700;
      text-transform: none;
      letter-spacing: 0.035em;
      text-align: center;
      color: #e6e8ed;
    }
    .cap-cta__disclaimer {
      max-width: 95%;
      margin: 0.5em 0 0 0;
      font-size: clamp(0.47rem, 1.1vw, 0.6rem);
      line-height: 1.4;
      font-weight: 500;
      text-transform: none;
      text-align: center;
      color: rgba(255, 255, 255, 0.55);
    }
    .slide.slide--text .cap.cap-text-only.cap-cta {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0.1em;
      padding: 7% 5.5% 8% 5.5%;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(40, 75, 200, 0.12) 0%, transparent 20%),
        linear-gradient(165deg, rgba(8,9,16,0.4) 0%, transparent 40%),
        radial-gradient(ellipse 95% 75% at 50% 50%, rgba(0,0,0,0.86) 0%, rgba(0,0,0,0.98) 100%),
        radial-gradient(ellipse 85% 55% at 50% 120%, rgba(200, 155, 60, 0.25), transparent 50%),
        linear-gradient(180deg, #020203 0%, #0a0a12 100%);
      box-shadow: inset 0 0 36px rgba(0,0,0,0.35);
    }
    .cap-cta__copy {
      max-width: 100%;
      text-align: center;
      text-transform: uppercase;
      font-weight: 800;
    }
    .slide.slide--text .cap.cap-text-only.cap-cta .cap-cta__copy {
      font-size: clamp(1.75rem, 7.2vw, 2.4rem);
      line-height: 0.9;
      letter-spacing: 0.035em;
      color: #ffffff;
      text-shadow:
        0 0 1px #000,
        0 2px 4px rgba(0,0,0,0.9),
        0 6px 28px rgba(0,0,0,0.85);
    }
    .card > .slide:first-child.slide--text .cap.cap-text-only:not(.cap-cta) {
      font-size: clamp(2rem, 9vw, 3rem);
      line-height: 0.9;
      letter-spacing: 0.04em;
    }
    .slide .cap.pos-bottom {
      bottom: 0;
      padding-bottom: 11%;
      padding-top: 26%;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 52%, transparent 100%);
    }
    .slide .cap.pos-top {
      top: 0;
      padding-top: 11%;
      padding-bottom: 38%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.35) 48%, transparent 100%);
    }
    .slide .cap.pos-center {
      top: 50%;
      transform: translateY(-50%);
      padding-top: 5%;
      padding-bottom: 5%;
      background: radial-gradient(ellipse 88% 72% at 50% 50%, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.32) 58%, transparent 74%);
    }
    .slide .cap.pos-split {
      top: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-top: 9%;
      padding-bottom: 9%;
      background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 36%, transparent 64%, rgba(0,0,0,0.5) 100%);
    }
    .slide .cap.pos-split .ln { display: block; }
    /* Slow Ken Burns: gentle zoom in ↔ out, long duration, alternate avoids end snap */
    .cam-zoom-slow {
      animation: kCamZoomSlow 34s ease-in-out infinite alternate;
    }
    @keyframes kCamZoomSlow {
      from { transform: scale(0.86); }
      to { transform: scale(0.99); }
    }
  </style>

          var ctaLa = document.createElement('p');
          ctaLa.className = 'cap-cta__la';
          ctaLa.textContent = 'Los Angeles nursing home neglect attorneys';
          var ctaDisclaimer = document.createElement('p');
          ctaDisclaimer.className = 'cap-cta__disclaimer';
          ctaDisclaimer.textContent =
            'Attorney advertising. This is not legal advice. Past results do not guarantee, warrant, or predict a similar outcome. No attorney-client relationship is formed from viewing this ad. California attorneys. Additional terms, fees, and conditions may apply to any representation.';
          cap.appendChild(ctaCopy);
          var ctaSub = document.createElement('p');
          ctaSub.className = 'cap-cta__subline';
          ctaSub.textContent = 'Takes less than 30 seconds';
          cap.appendChild(ctaSub);
          cap.appendChild(ctaLa);
          cap.appendChild(createCtaWordmark());
          cap.appendChild(ctaDisclaimer);
        } else {
          fillCaption(cap, slide.text, pos, 6);
        }
        el.appendChild(cap);
      }
      card.appendChild(el);
      els.push(el);
    }
    document.body.appendChild(card);
    var i = 0;
    function microPauseMs() {
      return 80 + ((rng() * 41) | 0);
    }
    function advance() {
      i = (i + 1) % n;
      for (var j = 0; j < els.length; j++) els[j].classList.toggle('on', j === i);
      var delay = durations[i] * 1000 + microPauseMs();
      if (i === n - 2) delay += 250 + (rng() * 151) | 0;
      setTimeout(advance, delay);
    }
    setTimeout(advance, durations[0] * 1000 + microPauseMs());
  }

  for (var k = 0; k < variations.length; k++) buildCard(variations[k], k);
})();
  </script>
