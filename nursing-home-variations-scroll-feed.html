      -webkit-font-smoothing: antialiased;
      padding: 48px 16px 88px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 64px;
      background:
        radial-gradient(ellipse 90% 70% at 20% 10%, rgba(50, 75, 150, 0.18), transparent 50%),
        radial-gradient(ellipse 80% 50% at 80% 90%, rgba(140, 90, 40, 0.1), transparent 50%),
        radial-gradient(ellipse 100% 80% at 50% -15%, rgba(32, 38, 68, 0.55), transparent 52%),
        linear-gradient(180deg, #0a0a10 0%, #050508 45%, #07070b 100%);
    }
    .card {
      width: min(360px, 92vw);
      aspect-ratio: 9 / 16;
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      background: linear-gradient(180deg, #0f1018 0%, #07070c 40%, #0a0a12 100%);
      box-shadow:
        0 22px 56px rgba(0,0,0,0.72),
        0 0 0 1px rgba(255,255,255,0.05),
        0 0 80px -25px rgba(50, 90, 180, 0.14);
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 14px;
      padding: 1px;
      box-sizing: border-box;
      background: linear-gradient(145deg,
        rgba(255,255,255,0.07) 0%,
        rgba(180, 150, 90, 0.1) 45%,
        rgba(255,255,255,0.03) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      pointer-events: none;
      z-index: 4;
    }
    .logo-cta {
      display: block;
      margin: 0.55em 0 0 0;
      line-height: 0;
    }
    .logo-cta .logo-inner {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2em;
      max-width: 100%;
      padding: 0.5em 0.75em 0.4em 0.75em;
      line-height: 1.05;
      text-align: center;
      text-rendering: optimizeLegibility;
      color: #fafbfc;
      background: linear-gradient(180deg, rgba(18,18,26,0.96) 0%, rgba(8,8,12,0.98) 100%);
      border-radius: 2px;
    }
    .logo-line {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      text-transform: uppercase;
      font-weight: 800;
    }
    .logo-line--brand {
      font-size: clamp(0.8rem, 2.4vw, 0.95rem);
      letter-spacing: 0.2em;
      text-indent: 0.1em;
    }
    .logo-line--trademark {
      font-size: clamp(0.72rem, 2.1vw, 0.86rem);
      font-weight: 700;
      letter-spacing: 0.32em;
      text-indent: 0.1em;
      color: #e8eaed;
    }
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.5s ease, filter 0.5s ease;
      pointer-events: none;
      z-index: 0;
    }
    .slide.on {
      opacity: 1;
      z-index: 3;
      filter: blur(0px);
    }
    .slide:not(.on) {
      filter: blur(4px);
    }
    .slide .layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #000;
    }
    .slide .layer::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        radial-gradient(circle at 50% 120%, rgba(255,180,0,0.12), transparent 60%),
        linear-gradient(to top, rgba(0,0,0,0.5), transparent 40%);
    }
    .slide.slide--image .layer::after {
      display: block;
      z-index: 2;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.2) 0%, transparent 22%),
        linear-gradient(0deg, rgba(0,0,0,0.35) 0%, transparent 28%),
        linear-gradient(90deg, rgba(0,0,0,0.18) 0%, transparent 10%, transparent 90%, rgba(0,0,0,0.18) 100%),
        radial-gradient(ellipse 100% 85% at 50% 50%, transparent 55%, rgba(0,0,0,0.4) 100%),
        linear-gradient(130deg, rgba(45, 75, 200, 0.06) 0%, transparent 40%);
    }
    .slide.slide--text .layer::after {
      display: none;
    }
    .slide.slide--image .layer {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4.5% 5.5%;
      background:
        radial-gradient(ellipse 95% 70% at 50% 0%, rgba(50, 70, 120, 0.22) 0%, transparent 55%),
        radial-gradient(ellipse 90% 55% at 50% 100%, rgba(150, 100, 50, 0.12) 0%, transparent 50%),
        linear-gradient(160deg, #0a0a12 0%, #020203 45%, #06060c 100%);
      box-shadow: inset 0 0 72px rgba(0,0,0,0.3);
    }
    .slide .layer img {
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      object-fit: contain;
      object-position: center center;
      display: block;
      transform-origin: center center;
      will-change: transform;
    }
    .slide.slide--image .layer img {
      position: relative;
      z-index: 0;
      width: auto;
      height: auto;
      left: auto;
      top: auto;
      max-width: 100%;
      max-height: 100%;
      margin: auto;
      border-radius: 4px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.2),
        0 10px 36px rgba(0,0,0,0.42);
      transform: scale(0.88);
    }
    .slide .cap {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 3;
      padding-left: 7%;
      padding-right: 7%;
      font-weight: 900;
      font-size: clamp(1.12rem, 4.8vw, 1.42rem);
      line-height: 1.02;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      text-align: center;
      color: #fafafa;
      text-shadow: 0 0 2px #000, 0 3px 20px rgba(0,0,0,0.95), 0 0 36px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.48s ease 0.1s;
    }
    .slide.on .cap { opacity: 1; }
    .slide.slide--text .cap.cap-text-only {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-rendering: optimizeLegibility;
      padding: 10% 7%;

      text-shadow:

        0 1px 2px rgba(0,0,0,0.95),

      justify-content: center;

    .slide .cap.pos-top {

      padding-top: 5%;

      display: flex;
      flex-direction: column;
      justify-content: space-between;

    .slide .cap.pos-split .ln { display: block; }
    /* Slow Ken Burns: gentle zoom in ↔ out, long duration, alternate avoids end snap */
    .cam-zoom-slow {
      animation: kCamZoomSlow 34s ease-in-out infinite alternate;
    }
    @keyframes kCamZoomSlow {
      from { transform: scale(0.86); }
      to { transform: scale(0.99); }
    }
    .cam-zoom-slow.cam-zoom-slow--lag3 {
      animation-delay: -8.5s;
    }
    .cam-zoom-slow.cam-zoom-slow--lag2 {
      animation-delay: -17s;
    }
    .cam-zoom-slow.cam-zoom-slow--lag1 {

            'Attorney advertising. This is not legal advice. Past results do not guarantee, warrant, or predict a similar outcome. No attorney-client relationship is formed from viewing this ad. California attorneys. Additional terms, fees, and conditions may apply to any representation.';
          cap.appendChild(ctaCopy);
          cap.appendChild(ctaLa);
          cap.appendChild(createCtaWordmark());
          cap.appendChild(ctaDisclaimer);
        } else {
          fillCaption(cap, slide.text, pos, 5);
        }
        el.appendChild(cap);
      }
      card.appendChild(el);
      els.push(el);
    }
    document.body.appendChild(card);
    var i = 0;
    function microPauseMs() {
      return 80 + ((rng() * 41) | 0);
    }
    function advance() {
      i = (i + 1) % n;
      for (var j = 0; j < els.length; j++) els[j].classList.toggle('on', j === i);
      setTimeout(advance, durations[i] * 1000 + microPauseMs());
    }
    setTimeout(advance, durations[0] * 1000 + microPauseMs());
  }

  for (var k = 0; k < variations.length; k++) buildCard(variations[k], k);
})();
  </script>
