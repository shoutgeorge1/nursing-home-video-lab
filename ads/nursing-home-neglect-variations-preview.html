      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;

    header {
      width: min(720px, 100%);
      text-align: center;
    }

    p.note code { background: var(--card); padding: 2px 6px; border-radius: 4px; font-size: 0.78rem; }
    .toolbar {
      width: min(720px, 100%);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;

    }
    label { font-size: 0.8rem; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    select, button {
      font: inherit;
      font-size: 0.9rem;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: var(--card);
      color: var(--text);
    }
    button {
      cursor: pointer;
      border-color: var(--accent);
      color: #fff;
      background: #1d4ed8;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.secondary { background: var(--card); color: var(--text); border-color: #444; }
    .meta {
      width: min(720px, 100%);
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
    .stage-wrap {
      width: min(100vw - 32px, 360px);
      aspect-ratio: 9 / 16;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.55);
      background: #000;
    }
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.08s linear;
    }
    .slide.on { opacity: 1; }
    .slide-inner {
      position: absolute;
      inset: -6%;
      background: #1a1a1a center / cover no-repeat;
      animation: kb 2.2s ease-in-out infinite alternate;
    }
    @keyframes kb {
      from { transform: scale(1.06) translate(-1.2%, 0); }
      to { transform: scale(1.1) translate(1.2%, 0); }
    }
    .slide-inner.missing { animation: none; transform: none; inset: 0; }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 14% 8% 12%;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.2) 45%, transparent 70%);
    }
    .overlay span {
      font-weight: 800;
      font-size: clamp(0.95rem, 4.2vw, 1.05rem);
      text-align: center;
      line-height: 1.15;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    }
    .missing-label {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      font-size: 0.65rem;
      color: #fca5a5;
      background: rgba(0,0,0,0.65);
      padding: 6px 8px;
      border-radius: 6px;
      word-break: break-all;
    }
    .progress {
      width: min(720px, 100%);
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress > i {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.1s linear;
    }
    .strip {
      width: min(720px, 100%);
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .thumb {
      flex: 0 0 auto;
      width: 44px;
      height: 78px;
      border-radius: 4px;
      background: #222 center/cover;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 0.6rem;
      color: var(--muted);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 2px;
    }
    .thumb.on { border-color: var(--accent); color: #fff; }

  <script>
    (function () {
      const ASSET_BASE = new URL('../assets/nursing-home/', window.location.href).href;
      const VARIATIONS = JSON.parse(document.getElementById('variations-data').textContent);

      const pick = document.getElementById('pick');
      const meta = document.getElementById('meta');
      const stage = document.getElementById('stage');
      const bar = document.getElementById('bar');
      const strip = document.getElementById('strip');
      const btnPlay = document.getElementById('play');
      const btnStop = document.getElementById('stop');
      const btnPrev = document.getElementById('prev');
      const btnNext = document.getElementById('next');

      let vIdx = 0;
      let sIdx = 0;
      let timers = [];
      let playing = false;

      function totalDur(v) {
        return v.slides.reduce((a, s) => a + s.duration, 0);
      }

      function buildPick() {
        pick.innerHTML = '';
        VARIATIONS.forEach((v, i) => {
          const o = document.createElement('option');
          o.value = String(i);
          o.textContent = v.video_id.replace('variation_', '') + ' — ' + v.hook_type + ' / ' + v.emotional_angle;
          pick.appendChild(o);
        });
      }

      function slideUrl(name) {
        const base = name.replace(/\.(jpg|jpeg)$/i, '');
        return [
          ASSET_BASE + encodeURIComponent(name),
          ASSET_BASE + encodeURIComponent(base + '.png'),
          ASSET_BASE + encodeURIComponent(base + '.webp'),
        ];
      }

      function renderStage() {
        const v = VARIATIONS[vIdx];
        stage.innerHTML = '';
        strip.innerHTML = '';
        v.slides.forEach((s, i) => {
          const el = document.createElement('div');
          el.className = 'slide' + (i === sIdx ? ' on' : '');
          el.dataset.i = String(i);
          const inner = document.createElement('div');
          inner.className = 'slide-inner missing';
          const urls = slideUrl(s.image);
          let u = 0;
          const tryNext = () => {
            if (u >= urls.length) return;
            const img = new Image();
            img.onload = () => {
              inner.style.backgroundImage = 'url("' + urls[u].replace(/"/g, '\\"') + '")';
              inner.classList.remove('missing');
              const miss = inner.querySelector('.missing-label');
              if (miss) miss.remove();
            };
            img.onerror = () => {
              u += 1;
              tryNext();
            };
            img.src = urls[u];
          };
          tryNext();
          const miss = document.createElement('div');
          miss.className = 'missing-label';
          miss.textContent = 'No image: assets/nursing-home/' + s.image;
          inner.appendChild(miss);
          const ov = document.createElement('div');
          ov.className = 'overlay';
          const sp = document.createElement('span');
          sp.textContent = s.text;
          ov.appendChild(sp);
          el.appendChild(inner);
          el.appendChild(ov);
          stage.appendChild(el);

          const th = document.createElement('button');
          th.type = 'button';
          th.className = 'thumb' + (i === sIdx ? ' on' : '');
          th.title = 'Slide ' + (i + 1);
          th.textContent = String(i + 1);
          th.addEventListener('click', () => {
            sIdx = i;
            stop();
            updateSlidesOnly();
          });
          strip.appendChild(th);
        });
        meta.textContent =
          v.video_id +
          ' · hook: ' +
          v.hook_type +
          ' · angle: ' +
          v.emotional_angle +
          ' · ~' +
          totalDur(v).toFixed(1) +
          's total';
        updateBar();
      }

      function updateSlidesOnly() {
        const slides = stage.querySelectorAll('.slide');
        slides.forEach((el, i) => el.classList.toggle('on', i === sIdx));
        strip.querySelectorAll('.thumb').forEach((el, i) => el.classList.toggle('on', i === sIdx));
        updateBar();
      }

      function updateBar() {
        const v = VARIATIONS[vIdx];
        let before = 0;
        for (let i = 0; i < sIdx; i++) before += v.slides[i].duration;
        const cur = v.slides[sIdx].duration;
        const tot = totalDur(v);
        const pct = tot ? ((before + cur) / tot) * 100 : 0;
        bar.style.width = pct + '%';
      }

      function clearTimers() {
        timers.forEach(clearTimeout);
        timers = [];
        playing = false;
        btnPlay.disabled = false;
      }

      function stop() {
        clearTimers();
      }

      function play() {
        stop();
        playing = true;
        btnPlay.disabled = true;
        const v = VARIATIONS[vIdx];
        let t = 0;
        sIdx = 0;
        updateSlidesOnly();
        v.slides.forEach((s, i) => {
          const id = setTimeout(() => {
            sIdx = i;
            updateSlidesOnly();
          }, t * 1000);
          timers.push(id);
          t += s.duration;
        });
        const end = setTimeout(() => {
          playing = false;
          btnPlay.disabled = false;
          sIdx = v.slides.length - 1;
          updateSlidesOnly();
        }, t * 1000);
        timers.push(end);
      }

      pick.addEventListener('change', () => {
        vIdx = Number(pick.value);
        sIdx = 0;
        stop();
        renderStage();
      });

      btnPlay.addEventListener('click', play);
      btnStop.addEventListener('click', stop);
      btnPrev.addEventListener('click', () => {
        stop();
        sIdx = Math.max(0, sIdx - 1);
        updateSlidesOnly();
      });
      btnNext.addEventListener('click', () => {
        stop();
        sIdx = Math.min(VARIATIONS[vIdx].slides.length - 1, sIdx + 1);
        updateSlidesOnly();
      });

      buildPick();
      renderStage();
    })();
  </script>
</body>
</html>
