  <script>
(function () {
  var ASSET_BASE = new URL('../assets/nursing-home/', window.location.href).href;
  var IMAGE_POOL = [
    'black_white_elder_drinking.jpg',
    'daughter_holding_hand.jpg',
    'bedside_family.jpg',
    'nurse_on_phone_ignoring.jpg',
    'unattended_patient.jpg',

    'attorney_reviewing_documents.jpg',
    'call_now_screen.jpg',
    'elderly_wheelchair_window_dark.jpg',
    'worried_daughter_couch.jpg',
    'repositioning_patient.jpg',
    'male_attorney_papers.jpg'
  ];
  var POS = ['pos-bottom', 'pos-top', 'pos-center', 'pos-split'];
  var MOTIONS = ['motion-impact', 'motion-slide-up', 'motion-slide-left', 'motion-zoom', 'motion-glitch', 'motion-fade'];
  var variations = JSON.parse(document.getElementById('variations-json').textContent);

  function hashStr(s) {
    var h = 2166136261;
    for (var i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function mulberry32(seed) {
    return function () {
      var t = (seed += 0x6d2b79f5);
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function shuffle(arr, rng) {
    var a = arr.slice();
    var i = a.length;
    while (i > 1) {
      var j = (rng() * i) | 0;
      i--;
      var t = a[i];
      a[i] = a[j];
      a[j] = t;
    }
    return a;
  }

  function stemVariants(fname) {
    var base = fname.replace(/\.(jpe?g|png|webp)$/i, '');
    var tries = [fname, base + '.jpg', base + '.jpeg', base + '.png', base + '.webp'];
    var seen = {};
    var out = [];
    for (var i = 0; i < tries.length; i++) {
      if (!seen[tries[i]]) {
        seen[tries[i]] = 1;
        out.push(tries[i]);
      }
    }
    return out;
  }

  function urlsForFile(fname) {
    var u = [];
    stemVariants(fname).forEach(function (n) {
      u.push(ASSET_BASE + encodeURIComponent(n));
    });
    return u;
  }

  function buildUrlQueue(primary, poolOrdered) {
    var q = [];
    urlsForFile(primary).forEach(function (x) {
      if (q.indexOf(x) === -1) q.push(x);
    });
    for (var i = 0; i < poolOrdered.length; i++) {
      if (poolOrdered[i] === primary) continue;
      urlsForFile(poolOrdered[i]).forEach(function (x) {
        if (q.indexOf(x) === -1) q.push(x);
      });
    }
    return q;
  }

  function assignUniqueImages(videoId, slideCount, rng) {
    var sh = shuffle(IMAGE_POOL.slice(), rng);
    if (slideCount <= sh.length) {
      var pick = shuffle(sh.slice(), rng).slice(0, slideCount);
      for (var i = 1; i < pick.length; i++) {
        if (pick[i] === pick[i - 1]) {
          for (var j = 0; j < sh.length; j++) {
            var cand = sh[j];
            if (cand !== pick[i - 1] && (i >= pick.length - 1 || cand !== pick[i + 1])) {
              pick[i] = cand;
              break;
            }
          }
        }
      }
      return pick;
    }
    var out = [];
    for (var k = 0; k < slideCount; k++) {
      out.push(sh[k % sh.length]);
    }
    for (var a = 1; a < out.length; a++) {
      if (out[a] === out[a - 1]) {
        for (var b = 1; b < sh.length; b++) {
          var alt = sh[(a + b) % sh.length];
          if (alt !== out[a - 1]) {
            out[a] = alt;
            break;
          }
        }
      }
    }
    return out;
  }

  function jitterDuration(base, rng) {
    var lo = 1.0;
    var hi = 2.4;
    var t = base * (0.72 + rng() * 0.55);
    if (t < lo) t = lo + rng() * 0.35;
    if (t > hi) t = hi - rng() * 0.35;
    if (t < lo) t = lo;
    if (t > hi) t = hi;
    return Math.round(t * 1000) / 1000;
  }

  function wireImg(img, urlQueue) {
    var ix = 0;
    img.draggable = false;
    img.alt = '';
    img.decoding = 'async';
    img.onerror = function () {
      ix++;
      if (ix < urlQueue.length) img.src = urlQueue[ix];
    };
    img.src = urlQueue[0];
  }

  function fillCaption(el, text, posClass) {
    if (posClass !== 'pos-split') {
      el.textContent = text;
      return;
    }
    var parts = text.trim().split(/\s+/);
    var a;
    var b;
    if (parts.length === 1 && parts[0].length > 4) {
      var c = (parts[0].length / 2) | 0;
      a = parts[0].slice(0, c);
      b = parts[0].slice(c);
    } else {
      var mid = Math.max(1, (parts.length / 2) | 0);
      a = parts.slice(0, mid).join(' ');
      b = parts.slice(mid).join(' ');
    }
    var s1 = document.createElement('span');
    s1.className = 'ln';
    s1.textContent = a;
    var s2 = document.createElement('span');
    s2.className = 'ln';
    s2.textContent = b;
    el.appendChild(s1);
    el.appendChild(s2);
  }

  function buildCard(v, videoIndex) {
    var rng = mulberry32(hashStr(v.video_id + ':' + videoIndex));
    var slides = v.slides;
    var n = slides.length;
    var assignedFiles = assignUniqueImages(v.video_id, n, rng);
    var poolOrder = shuffle(IMAGE_POOL.slice(), rng);
    var durations = [];
    var posUsed = [];
    var motUsed = [];
    var card = document.createElement('article');
    card.className = 'card';
    var els = [];
    for (var s = 0; s < n; s++) {
      var rngS = mulberry32(hashStr(v.video_id + '#' + s + '#' + videoIndex));
      var slide = slides[s];
      var el = document.createElement('div');
      el.className = 'slide' + (s === 0 ? ' on' : '');
      var layer = document.createElement('div');
      layer.className = 'layer';
      var pic = document.createElement('img');
      var motion = MOTIONS[(rngS() * MOTIONS.length) | 0];
      if (s > 0 && motion === motUsed[motUsed.length - 1]) {
        motion = MOTIONS[(MOTIONS.indexOf(motion) + 1 + ((rngS() * 5) | 0)) % MOTIONS.length];
      }
      motUsed.push(motion);
      pic.className = motion;
      var animMs = (1.1 + rngS() * 1.1) * 1000;
      pic.style.animationDuration = Math.round(animMs) + 'ms';
      var primary = assignedFiles[s];
      var queue = buildUrlQueue(primary, poolOrder);
      wireImg(pic, queue);
      layer.appendChild(pic);
      var cap = document.createElement('div');
      var pos = POS[(rngS() * POS.length) | 0];
      if (s > 0 && pos === posUsed[posUsed.length - 1]) {
        pos = POS[(POS.indexOf(pos) + 1 + ((rngS() * 3) | 0)) % POS.length];
      }
      posUsed.push(pos);
      cap.className = 'cap ' + pos;
      fillCaption(cap, slide.text, pos);
      var d = jitterDuration(slide.duration, rngS);
      durations.push(d);
      el.appendChild(layer);
      el.appendChild(cap);
      card.appendChild(el);
      els.push(el);
    }
    document.body.appendChild(card);
    var i = 0;
    function advance() {
      i = (i + 1) % n;
      for (var j = 0; j < els.length; j++) {
        els[j].classList.toggle('on', j === i);
      }
      setTimeout(advance, durations[i] * 1000);
    }
    setTimeout(advance, durations[0] * 1000);
  }

  for (var k = 0; k < variations.length; k++) {
    buildCard(variations[k], k);
  }
})();
  </script>
</body>
</html>
