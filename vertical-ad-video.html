<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>15–18s vertical ad</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #01366c;
      --blue: #01468a;
      --slate: #0c2334;
      --gold: #ffbf00;
      --gold-d: #cc9900;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #000;
      font-family: Inter, Poppins, system-ui, sans-serif;
      overflow: hidden;
    }
    .stage-wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .stage {
      width: 1080px;
      height: 1920px;
      max-width: 100vw;
      max-height: calc(100vw * 1920 / 1080);
      aspect-ratio: 1080 / 1920;
      position: relative;
      overflow: hidden;
      background: #000;
    }
    .scene {
      position: absolute;
      inset: 0;
      opacity: 0;
      z-index: 0;
    }
    .bg {
      position: absolute;
      inset: -10%;
      background-size: cover;
      background-position: center;
      filter: blur(2px);
      will-change: transform;
      animation: bgKen 18s cubic-bezier(0.42, 0, 0.25, 1) infinite;
    }
    @keyframes bgKen {
      0% { transform: scale(1.055); }
      50% { transform: scale(1.09); }
      100% { transform: scale(1.065); }
    }
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    .s1 .overlay {
      background:
        linear-gradient(rgba(8, 12, 18, 0.92), rgba(1, 40, 78, 0.9)),
        linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0.35));
    }
    .s1 .bg { background-image: url('https://call.insideraccidentlawyers.com/images/la/hero-bg.webp'); }
    .s2 .bg { background-image: url('https://call.insideraccidentlawyers.com/images/la/woman-bed-dark-sad.png'); }
    .s2 .overlay {
      background: linear-gradient(185deg, rgba(18, 8, 8, 0.5) 0%, rgba(5, 12, 28, 0.92) 45%, rgba(0, 0, 0, 0.94) 100%);
    }
    .s3 .bg { background-image: url('https://call.insideraccidentlawyers.com/images/la/nurse-checks-bedsore.png'); }
    .s3 .overlay {
      background: linear-gradient(175deg, rgba(6, 10, 16, 0.88) 0%, rgba(1, 45, 88, 0.82) 55%, rgba(12, 18, 24, 0.9) 100%);
    }
    .s4 .bg { background-image: url('https://call.insideraccidentlawyers.com/images/la/attorney-hero-400.webp'); }
    .s4 .overlay {
      background: linear-gradient(200deg, rgba(0, 18, 40, 0.65) 0%, rgba(1, 40, 78, 0.82) 50%, rgba(0, 0, 0, 0.9) 100%);
    }
    .s5 .bg { background-image: url('https://call.insideraccidentlawyers.com/images/la/hero-bg.webp'); }
    .s5 .overlay {
      background: linear-gradient(180deg, rgba(8, 12, 18, 0.96) 0%, rgba(1, 40, 80, 0.94) 100%);
    }
    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px 48px 120px;
      text-align: center;
    }
    .s2 .content { justify-content: flex-end; padding-bottom: 140px; }
    .s3 .content { justify-content: center; padding-top: 88px; }
    .s4 .content { justify-content: flex-end; padding-bottom: 100px; }
    .s5 .content { justify-content: center; padding: 64px 40px 100px; }
    .hook-wrap {
      max-width: 960px;
      animation: hookSnap 18s cubic-bezier(0.34, 1.2, 0.64, 1) infinite;
    }
    @keyframes hookSnap {
      0% { opacity: 1; transform: scale(0.88); }
      2.5% { transform: scale(1.06); }
      5% { transform: scale(1); }
      10.5%, 100% { transform: scale(1); opacity: 1; }
    }
    .hook-main {
      font-family: Poppins, Inter, sans-serif;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      font-size: 102px;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 4px 0 rgba(0,0,0,0.45), 0 14px 40px rgba(0,0,0,0.55);
    }
    .hook-sub {
      display: block;
      margin-top: 20px;
      font-family: Inter, sans-serif;
      font-weight: 700;
      font-size: 44px;
      color: #ffd24a;
      letter-spacing: -0.02em;
      text-shadow: 0 8px 28px rgba(0,0,0,0.5);
      animation: hookSubIn 18s ease-out infinite;
    }
    @keyframes hookSubIn {
      0%, 2% { opacity: 0; transform: translateY(10px); }
      5%, 100% { opacity: 1; transform: translateY(0); }
    }
    .headline {
      font-family: Poppins, Inter, sans-serif;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.08;
      color: #fff;
      text-shadow: 0 6px 0 rgba(0,0,0,0.35), 0 16px 44px rgba(0,0,0,0.55);
    }
    .s2 .headline { font-size: 76px; color: #fff; }
    .s3 h2 {
      font-family: Poppins, sans-serif;
      font-weight: 800;
      font-size: 48px;
      color: #fff;
      margin-bottom: 32px;
      letter-spacing: -0.02em;
      text-shadow: 0 4px 24px rgba(0,0,0,0.45);
    }
    .checklist { list-style: none; width: 100%; max-width: 760px; }
    .checklist li {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 24px 26px;
      margin-bottom: 14px;
      background: rgba(255,255,255,0.97);
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 36px;
      font-weight: 700;
      color: #111827;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    .box {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border: 3px solid #6b7280;
      border-radius: 6px;
      position: relative;
      flex-shrink: 0;
    }
    .neglect {
      font-family: Poppins, sans-serif;
      font-weight: 800;
      font-size: 48px;
      color: #fff;
      margin-top: 32px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .s4 .headline { font-size: 48px; color: #fff; line-height: 1.18; max-width: 920px; }
    .cta {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 920px;
      min-height: 420px;
      background: linear-gradient(180deg, #ffd24a 0%, var(--gold) 45%, #e6ac00 100%);
      color: var(--navy);
      font-family: Poppins, sans-serif;
      font-weight: 800;
      font-size: 46px;
      line-height: 1.15;
      padding: 48px 40px 52px;
      border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 10px 0 var(--gold-d), 0 20px 48px rgba(0,0,0,0.5);
      letter-spacing: -0.01em;
      animation: ctaPulse 18s cubic-bezier(0.45, 0, 0.2, 1) infinite;
    }
    .cta .num {
      display: block;
      font-family: Inter, sans-serif;
      font-size: 76px;
      letter-spacing: 0.04em;
      margin-top: 20px;
      font-weight: 800;
    }

    .s1 { animation: v1 18s cubic-bezier(0.45, 0, 0.25, 1) infinite; }
    .s2 { animation: v2 18s cubic-bezier(0.45, 0, 0.25, 1) infinite; }
    .s3 { animation: v3 18s cubic-bezier(0.45, 0, 0.25, 1) infinite; }
    .s4 { animation: v4 18s cubic-bezier(0.45, 0, 0.25, 1) infinite; }
    .s5 { animation: v5 18s cubic-bezier(0.45, 0, 0.25, 1) infinite; }
    @keyframes v1 {
      0%, 10.5% { opacity: 1; z-index: 5; }
      11.2% { opacity: 0.4; z-index: 5; }
      12.2%, 100% { opacity: 0; z-index: 0; }
    }
    @keyframes v2 {
      0%, 10.5% { opacity: 0; z-index: 0; }
      11%, 12% { opacity: 1; z-index: 5; }
      12%, 26.5% { opacity: 1; z-index: 5; }
      27.2% { opacity: 0.35; z-index: 5; }
      28.5%, 100% { opacity: 0; z-index: 0; }
    }
    @keyframes v3 {
      0%, 27.2% { opacity: 0; z-index: 0; }
      28%, 29% { opacity: 1; z-index: 5; }
      29%, 54% { opacity: 1; z-index: 5; }
      55% { opacity: 0.35; z-index: 5; }
      56.2%, 100% { opacity: 0; z-index: 0; }
    }
    @keyframes v4 {
      0%, 55% { opacity: 0; z-index: 0; }
      55.8%, 57% { opacity: 1; z-index: 5; }
      57%, 70.5% { opacity: 1; z-index: 5; }
      71.5% { opacity: 0.35; z-index: 5; }
      73%, 100% { opacity: 0; z-index: 0; }
    }
    @keyframes v5 {
      0%, 71.8% { opacity: 0; z-index: 0; }
      73% { opacity: 0.35; z-index: 5; }
      75% { opacity: 0.85; z-index: 5; }
      76%, 100% { opacity: 1; z-index: 5; }
    }
    @keyframes ctaPulse {
      0%, 75.5% { transform: scale(1); box-shadow: 0 10px 0 var(--gold-d), 0 20px 48px rgba(0,0,0,0.5); }
      78% { transform: scale(1.035); box-shadow: 0 11px 0 var(--gold-d), 0 26px 56px rgba(0,0,0,0.55); }
      81% { transform: scale(1); box-shadow: 0 10px 0 var(--gold-d), 0 20px 48px rgba(0,0,0,0.5); }
      86% { transform: scale(1.03); }
      90% { transform: scale(1); }
      94% { transform: scale(1.025); }
      100% { transform: scale(1); }
    }

    .checklist li:nth-child(1) { animation: li1 18s linear infinite; }
    .checklist li:nth-child(2) { animation: li2 18s linear infinite; }
    .checklist li:nth-child(3) { animation: li3 18s linear infinite; }
    @keyframes li1 {
      0%, 30% { opacity: 0.55; border-color: var(--border); background: rgba(255,255,255,0.92); color: #1f2937; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
      31%, 100% { opacity: 1; border-color: rgba(1, 70, 138, 0.55); background: rgba(255,255,255,1); color: var(--navy); box-shadow: 0 0 0 3px rgba(1, 70, 138, 0.2), 0 12px 32px rgba(1, 54, 108, 0.22); }
    }
    @keyframes li2 {
      0%, 38% { opacity: 0.55; border-color: var(--border); background: rgba(255,255,255,0.92); color: #1f2937; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
      39%, 100% { opacity: 1; border-color: rgba(1, 70, 138, 0.55); background: rgba(255,255,255,1); color: var(--navy); box-shadow: 0 0 0 3px rgba(1, 70, 138, 0.2), 0 12px 32px rgba(1, 54, 108, 0.22); }
    }
    @keyframes li3 {
      0%, 46% { opacity: 0.55; border-color: var(--border); background: rgba(255,255,255,0.92); color: #1f2937; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
      47%, 100% { opacity: 1; border-color: rgba(1, 70, 138, 0.55); background: rgba(255,255,255,1); color: var(--navy); box-shadow: 0 0 0 3px rgba(1, 70, 138, 0.2), 0 12px 32px rgba(1, 54, 108, 0.22); }
    }
    .checklist li:nth-child(1) .box { animation: b1 18s linear infinite; }
    .checklist li:nth-child(2) .box { animation: b2 18s linear infinite; }
    .checklist li:nth-child(3) .box { animation: b3 18s linear infinite; }
    @keyframes b1 {
      0%, 30% { background: transparent; border-color: #6b7280; transform: scale(1); }
      30.5% { transform: scale(0.9); }
      31%, 100% { background: var(--blue); border-color: var(--blue); transform: scale(1); }
    }
    @keyframes b2 {
      0%, 38% { background: transparent; border-color: #6b7280; transform: scale(1); }
      38.5% { transform: scale(0.9); }
      39%, 100% { background: var(--blue); border-color: var(--blue); transform: scale(1); }
    }
    @keyframes b3 {
      0%, 46% { background: transparent; border-color: #6b7280; transform: scale(1); }
      46.5% { transform: scale(0.9); }
      47%, 100% { background: var(--blue); border-color: var(--blue); transform: scale(1); }
    }
    .checklist .box::after {
      content: '';
      position: absolute;
      left: 11px;
      top: 5px;
      width: 8px;
      height: 18px;
      border: solid #fff;
      border-width: 0 3px 3px 0;
      transform: rotate(45deg);
      opacity: 0;
    }
    .checklist li:nth-child(1) .box::after { animation: mk1 18s linear infinite; }
    .checklist li:nth-child(2) .box::after { animation: mk2 18s linear infinite; }
    .checklist li:nth-child(3) .box::after { animation: mk3 18s linear infinite; }
    @keyframes mk1 { 0%, 29.9% { opacity: 0; } 31%, 100% { opacity: 1; } }
    @keyframes mk2 { 0%, 37.9% { opacity: 0; } 39%, 100% { opacity: 1; } }
    @keyframes mk3 { 0%, 45.9% { opacity: 0; } 47%, 100% { opacity: 1; } }
    .neglect { animation: n1 18s cubic-bezier(0.45, 0, 0.25, 1) infinite; }
    @keyframes n1 {
      0%, 48.5% { opacity: 0; transform: translateY(16px); }
      50%, 54% { opacity: 1; transform: translateY(0); }
      55.2%, 100% { opacity: 0; transform: translateY(8px); }
    }
  </style>
</head>
<body>
  <div class="stage-wrap">
    <div class="stage" role="img" aria-label="Advertisement">
      <section class="scene s1">
        <div class="bg" aria-hidden="true"></div>
        <div class="overlay"></div>
        <div class="content">
          <div class="hook-wrap">
            <p class="hook-main">THIS IS NEGLECT</p>
            <span class="hook-sub">Not normal aging</span>
          </div>
        </div>
      </section>
      <section class="scene s2">
        <div class="bg" aria-hidden="true"></div>
        <div class="overlay"></div>
        <div class="content">
          <p class="headline">Wounds getting worse?</p>
        </div>
      </section>
      <section class="scene s3">
        <div class="bg" aria-hidden="true"></div>
        <div class="overlay"></div>
        <div class="content">
          <h2>Do ANY of these apply?</h2>
          <ul class="checklist">
            <li><span class="box" aria-hidden="true"></span> Bed sores</li>
            <li><span class="box" aria-hidden="true"></span> Not being repositioned</li>
            <li><span class="box" aria-hidden="true"></span> Calls ignored</li>
          </ul>
          <p class="neglect">This is likely neglect.</p>
        </div>
      </section>
      <section class="scene s4">
        <div class="bg" aria-hidden="true"></div>
        <div class="overlay"></div>
        <div class="content">
          <p class="headline">Los Angeles Nursing Home Neglect Lawyers</p>
        </div>
      </section>
      <section class="scene s5">
        <div class="bg" aria-hidden="true"></div>
        <div class="overlay"></div>
        <div class="content">
          <a class="cta" href="tel:8444674335">CALL NOW BEFORE IT GETS WORSE<span class="num">844-467-4335</span></a>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
